<h1>CRUD de Produtos</h1>

<!-- ➕ CADASTRO -->
<h3>Novo Produto</h3>

<input [(ngModel)]="novoProduto.nome" placeholder="Nome">
<input type="number" [(ngModel)]="novoProduto.preco" placeholder="Preço">
<input type="number" [(ngModel)]="novoProduto.quantidade" placeholder="Quantidade">

<button (click)="cadastrar()">Cadastrar</button>

<hr>

<!-- 📋 LISTA -->
<h3>Lista</h3>

<ul>
  <li *ngFor="let produto of produtos">

    <!-- NORMAL -->
    <span *ngIf="!produtoEditando || produtoEditando.id !== produto.id">
      {{ produto.id }} - {{ produto.nome }} | R$ {{ produto.preco }} | Qtd: {{ produto.quantidade }}
      <button (click)="editar(produto)">Editar</button>
      <button (click)="deletar(produto.id)">Excluir</button>
    </span>

    <!-- EDIÇÃO -->
    <span *ngIf="produtoEditando && produtoEditando.id === produto.id">
      <input [(ngModel)]="produtoEditando.nome">
      <input type="number" [(ngModel)]="produtoEditando.preco">
      <input type="number" [(ngModel)]="produtoEditando.quantidade">

      <button (click)="atualizar()">Salvar</button>
      <button (click)="cancelar()">Cancelar</button>
    </span>

  </li>
</ul>
